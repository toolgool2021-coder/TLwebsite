<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toolgool - Bio</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Snow Container -->
    <div id="snowContainer"></div>
    
    <!-- Main Content -->
    <div class="container">
        <!-- Avatar Section with Glow -->
        <div class="avatar-section">
            <div class="avatar-wrapper">
                <img id="avatarPreview" src="https://via.placeholder.com/250" alt="Avatar" class="avatar">
                <div class="avatar-glow"></div>
                <div class="upload-overlay">
                    <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
                    <button class="upload-btn" onclick="document.getElementById('avatarUpload').click()">
                        <i class="fas fa-camera"></i> Загрузить фото
                    </button>
                </div>
            </div>
        </div>

        <!-- Nickname with Neon Glow -->
        <h1 class="nickname">Toolgool</h1>

        <!-- Social Media Icons -->
        <div class="social-container">
            <a href="https://t.me/toolgool" class="social-link" title="Telegram" target="_blank">
                <i class="fab fa-telegram"></i>
            </a>
            <a href="https://www.tiktok.com/@toolgool" class="social-link" title="TikTok" target="_blank">
                <i class="fab fa-tiktok"></i>
            </a>
            <a href="https://www.instagram.com/toolgool" class="social-link" title="Instagram" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://www.youtube.com/@toolgool" class="social-link" title="YouTube" target="_blank">
                <i class="fab fa-youtube"></i>
            </a>
            <a href="https://vk.com/toolgool" class="social-link" title="VK" target="_blank">
                <i class="fab fa-vk"></i>
            </a>
            <a href="https://discord.com/users/toolgool" class="social-link" title="Discord" target="_blank">
                <i class="fab fa-discord"></i>
            </a>
            <a href="https://www.twitch.tv/toolgool" class="social-link" title="Twitch" target="_blank">
                <i class="fab fa-twitch"></i>
            </a>
            <a href="https://twitter.com/toolgool" class="social-link" title="X (Twitter)" target="_blank">
                <i class="fab fa-x-twitter"></i>
            </a>
            <a href="https://www.facebook.com/toolgool" class="social-link" title="Facebook" target="_blank">
                <i class="fab fa-facebook"></i>
            </a>
            <a href="https://www.snapchat.com/add/toolgool" class="social-link" title="Snapchat" target="_blank">
                <i class="fab fa-snapchat"></i>
            </a>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
              </html>
