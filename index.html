<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toolgool - Bio Site</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Falling Snow Canvas -->
    <canvas id="snowCanvas"></canvas>

    <!-- Main Container -->
    <div class="container">
        <!-- Profile Section -->
        <div class="profile-section">
            <!-- Avatar Container -->
            <div class="avatar-container">
                <div class="avatar-wrapper">
                    <img id="avatarImg" src="images/icon.png" alt="Toolgool Avatar" class="avatar">
                    <label for="avatarInput" class="avatar-upload-btn" title="Change Avatar">
                        📷
                    </label>
                    <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                </div>
            </div>

            <!-- Username -->
            <h1 class="username">@Toolgool</h1>

            <!-- Social Links -->
            <div class="social-links">
                <a href="https://t.me/Toolgool" target="_blank" class="social-link" title="Telegram">
                    <img src="images/Telegram.png" alt="Telegram">
                </a>
                <a href="https://www.tiktok.com/@Toolgool" target="_blank" class="social-link" title="TikTok">
                    <img src="images/TikTok.png" alt="TikTok">
                </a>
                <a href="https://www.instagram.com/Toolgool" target="_blank" class="social-link" title="Instagram">
                    <img src="images/Instagram.png" alt="Instagram">
                </a>
                <a href="https://www.youtube.com/@Toolgool" target="_blank" class="social-link" title="YouTube">
                    <img src="images/YouTube.png" alt="YouTube">
                </a>
                <a href="https://vk.com/Toolgool" target="_blank" class="social-link" title="VK">
                    <img src="images/VK.png" alt="VK">
                </a>
                <a href="https://discord.com/users/Toolgool" target="_blank" class="social-link" title="Discord">
                    <img src="images/Discord.png" alt="Discord">
                </a>
                <a href="https://www.twitch.tv/Toolgool" target="_blank" class="social-link" title="Twitch">
                    <img src="images/Twitch.png" alt="Twitch">
                </a>
                <a href="https://x.com/Toolgool" target="_blank" class="social-link" title="X (Twitter)">
                    <img src="images/X.png" alt="X">
                </a>
                <a href="https://www.facebook.com/Toolgool" target="_blank" class="social-link" title="Facebook">
                    <img src="images/Facebook.png" alt="Facebook">
                </a>
                <a href="https://www.snapchat.com/add/Toolgool" target="_blank" class="social-link" title="Snapchat">
                    <img src="images/Snapchat.png" alt="Snapchat">
                </a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
