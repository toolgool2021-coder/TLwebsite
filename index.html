<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toolgool - Bio Profile</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="header-content">
            <div class="logo">⚡ Toolgool Bio</div>
            <div class="header-info" id="headerInfo">
                Свайп или используй стрелки →
            </div>
        </div>
    </header>

    <!-- ===== MAIN SECTION ===== -->
    <main class="main-container">
        
        <!-- CAROUSEL SECTION -->
        <section class="carousel-section">
            <div class="carousel-wrapper">
                
                <!-- LEFT ARROW -->
                <button class="carousel-arrow carousel-prev" id="prevBtn" aria-label="Previous profile">
                    <i class="fas fa-chevron-left"></i>
                </button>

                <!-- CARDS CONTAINER -->
                <div class="carousel-track-wrapper">
                    <div class="carousel-track" id="cardsTrack">
                        <!-- Cards rendered here -->
                    </div>
                </div>

                <!-- RIGHT ARROW -->
                <button class="carousel-arrow carousel-next" id="nextBtn" aria-label="Next profile">
                    <i class="fas fa-chevron-right"></i>
                </button>

            </div>

            <!-- CAROUSEL INDICATORS -->
            <div class="carousel-indicators" id="indicators"></div>
        </section>

    </main>

    <!-- ===== EFFECTS LAYER ===== -->
    <div id="effectsLayer" class="effects-layer"></div>

    <!-- ===== SCRIPTS ===== -->
    <script src="users.js"></script>
    <script src="script.js"></script>

</body>
</html>
